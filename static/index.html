<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rizzi CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f8f6;
    --surface: #fff;
    --border: #e0e0dc;
    --black: #111;
    --gray: #888;
    --light: #f0f0ec;
    --accent: #111;
    --font: 'DM Mono', monospace;
    --serif: 'Cormorant Garamond', serif;
    --radius: 2px;
    --section-archive: #111;
    --section-interview: #555;
    --section-about: #888;
  }
  [data-theme="dark"] {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --black: #f0f0f0;
    --gray: #666;
    --light: #222;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    font-size: 11px;
    background: var(--bg);
    color: var(--black);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  .logo span { color: var(--gray); font-weight: 300; }
  .header-actions { display: flex; gap: 16px; align-items: center; }
  .btn-text {
    background: none; border: none;
    font-family: var(--font); font-size: 10px;
    letter-spacing: 0.4px; color: var(--gray);
    cursor: pointer; padding: 0;
    transition: color .15s;
  }
  .btn-text:hover { color: var(--black); }
  .btn-text.primary { color: var(--black); font-weight: 500; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr 340px;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h2 {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--gray);
  }
  .section-filters {
    display: flex;
    gap: 0;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: none; border: none;
    font-family: var(--font); font-size: 10px;
    letter-spacing: 0.3px; color: var(--gray);
    cursor: pointer; padding: 4px 8px 4px 0;
    transition: color .15s;
  }
  .filter-btn.active { color: var(--black); font-weight: 500; }
  .filter-btn:hover { color: var(--black); }

  .project-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .project-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .1s, border-color .1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .project-item:hover { background: var(--light); }
  .project-item.active {
    background: var(--light);
    border-left-color: var(--black);
  }
  .project-item-info { flex: 1; min-width: 0; }
  .project-item-title {
    font-size: 11px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .project-item-meta {
    font-size: 9px; color: var(--gray); margin-top: 2px;
    display: flex; gap: 6px;
  }
  .section-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gray);
    flex-shrink: 0;
    margin-top: 3px;
  }
  .section-dot.archive     { background: #111; }
  .section-dot.interview    { background: #666; }
  .section-dot.about        { background: #aaa; }
  .section-dot.cities       { background: #2a6496; }
  .section-dot.books        { background: #8b5e3c; }
  .section-dot.sculptures   { background: #5a7a5a; }
  .section-dot.biography    { background: #7a5a7a; }
  .section-dot.contact      { background: #7a7a5a; }
  .section-dot.index         { background: #3a3a3a; }
  [data-theme="dark"] .section-dot.archive { background: #eee; }

  /* ── MAIN EDITOR ── */
  .editor {
    overflow-y: auto;
    padding: 32px 40px;
    background: var(--bg);
  }
  .editor-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%;
    color: var(--gray); font-size: 11px; letter-spacing: 0.4px;
  }

  .editor-title {
    font-family: var(--serif);
    font-size: 28px; font-weight: 400;
    margin-bottom: 24px;
    line-height: 1.2;
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab-btn {
    background: none; border: none;
    font-family: var(--font); font-size: 10px;
    letter-spacing: 0.4px; color: var(--gray);
    padding: 8px 16px 8px 0;
    cursor: pointer;
    border-bottom: 1.5px solid transparent;
    margin-bottom: -1px;
    transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--black); border-bottom-color: var(--black); }
  .tab-btn:hover { color: var(--black); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Form fields */
  .field-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .field-group.full { grid-template-columns: 1fr; }
  .field {
    display: flex; flex-direction: column; gap: 4px;
  }
  label {
    font-size: 9px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--gray);
  }
  input, textarea, select {
    font-family: var(--font); font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--black);
    padding: 8px 10px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--black);
  }
  textarea { resize: vertical; min-height: 80px; }

  .save-btn {
    background: var(--black); color: var(--bg);
    border: none; font-family: var(--font);
    font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 10px 20px; cursor: pointer;
    transition: opacity .15s;
    margin-top: 8px;
  }
  .save-btn:hover { opacity: .75; }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    color: var(--gray);
    margin-bottom: 20px;
    transition: border-color .2s, background .2s;
    cursor: pointer;
  }
  .upload-zone.drag-over {
    border-color: var(--black);
    background: var(--light);
  }
  .upload-zone p { font-size: 11px; margin-bottom: 4px; }
  .upload-zone small { font-size: 9px; }

  /* ── IMAGE GRID ── */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 6px;
    margin-bottom: 20px;
  }
  .image-cell {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--light);
    border-radius: var(--radius);
  }
  .image-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .image-cell .img-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s;
  }
  .image-cell:hover .img-overlay { opacity: 1; }
  .img-del-btn {
    background: none; border: none;
    color: #fff; font-size: 16px;
    cursor: pointer; padding: 4px;
  }
  .image-cell .img-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.6);
    padding: 3px 5px;
    font-size: 8px; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── GRIGLIA IMMAGINI AVANZATA ── */
  .image-cell .img-overlay {
    flex-direction: column;
    gap: 4px;
  }
  .img-actions {
    display: flex; gap: 4px;
  }
  .img-action-btn {
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
    color: #fff; font-size: 8px; letter-spacing: .4px;
    cursor: pointer; padding: 3px 6px; border-radius: 2px;
    white-space: nowrap;
  }
  .img-action-btn:hover { background: rgba(255,255,255,.3); }
  .img-action-btn.danger { border-color: #ff6b6b; color: #ff6b6b; }
  .img-kw-badge {
    position: absolute; top: 4px; left: 4px;
    font-size: 7px; letter-spacing: .3px; padding: 2px 5px;
    border-radius: 2px; font-weight: 600;
    pointer-events: none;
  }
  .img-kw-badge.has-iptc  { background: #1a7a3a; color: #7effa0; }
  .img-kw-badge.has-ai    { background: #1a3a7a; color: #7eaaff; }
  .img-kw-badge.has-both  { background: #5a1a7a; color: #d07eff; }
  .img-kw-badge.no-kw     { background: rgba(0,0,0,.5); color: #888; }
  .img-kw-count {
    position: absolute; bottom: 4px; right: 4px;
    font-size: 7px; color: rgba(255,255,255,.6);
    pointer-events: none;
  }
  /* Toolbar sopra la griglia foto */
  .images-toolbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .images-toolbar .btn-text { font-size: 9px; }
  .iptc-status-bar {
    font-size: 9px; color: var(--gray); letter-spacing: .3px;
    padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .iptc-status-bar strong { color: var(--text); }

  /* ── TESTI ── */
  .text-blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .text-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    position: relative;
  }
  .text-block-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .block-type-badge {
    font-size: 8px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--gray);
    background: var(--light); padding: 2px 6px;
    border-radius: 2px;
  }
  .block-type-badge.pullquote { color: #c8a96e; }
  .block-type-badge.question  { color: #6e9ec8; }
  .block-type-badge.answer    { color: #7ec86e; }
  .block-del-btn {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none;
    color: var(--gray); font-size: 14px;
    cursor: pointer; line-height: 1;
  }
  .block-del-btn:hover { color: var(--black); }
  .text-block textarea {
    border: none; background: transparent;
    padding: 0; font-size: 11px;
    resize: none; min-height: 48px;
    width: 100%;
  }
  .text-block textarea:focus { outline: none; }

  .add-block-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .add-block-btn {
    background: none;
    border: 1px solid var(--border);
    font-family: var(--font); font-size: 9px;
    letter-spacing: 0.4px; color: var(--gray);
    padding: 5px 10px; cursor: pointer;
    border-radius: var(--radius);
    transition: border-color .15s, color .15s;
  }
  .add-block-btn:hover { border-color: var(--black); color: var(--black); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .preview-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .preview-header h3 {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--gray);
  }
  .preview-body {
    flex: 1; overflow-y: auto;
    padding: 20px;
  }
  .preview-project-title {
    font-family: var(--serif);
    font-size: 20px; font-weight: 400;
    margin-bottom: 4px;
  }
  .preview-meta {
    font-size: 9px; color: var(--gray);
    letter-spacing: 0.4px; margin-bottom: 16px;
    display: flex; gap: 8px;
  }
  .preview-cover {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    margin-bottom: 12px;
    background: var(--light);
  }
  .preview-thumbs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    margin-bottom: 16px;
  }
  .preview-thumbs img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover; display: block;
  }
  .preview-text-block { margin-bottom: 12px; }
  .preview-body-text {
    font-family: var(--serif); font-size: 13px;
    line-height: 1.65; color: var(--black);
  }
  .preview-pullquote {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; line-height: 1.5;
    border-left: 2px solid var(--black);
    padding-left: 12px; color: var(--black);
  }
  .preview-caption {
    font-size: 9px; color: var(--gray);
    letter-spacing: 0.3px;
  }
  .preview-question {
    font-family: var(--serif); font-weight: 600;
    font-size: 13px; margin-bottom: 4px;
  }
  .preview-answer {
    font-family: var(--serif); font-size: 13px;
    line-height: 1.65; color: var(--black);
  }
  .preview-divider {
    border: none; border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* ── CATEGORIES MANAGER ── */
  .cat-manager {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
  }
  .cat-manager h4 {
    font-size: 9px; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--gray);
    margin-bottom: 12px;
  }
  .cat-list { display: flex; flex-direction: column; gap: 6px; }
  .cat-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    background: var(--light);
    border-radius: var(--radius);
  }
  .cat-row-name {
    flex: 1;
    font-size: 11px; font-weight: 500;
  }
  .cat-row-count {
    font-size: 9px; color: var(--gray);
    min-width: 40px; text-align: right;
  }
  .cat-row-btn {
    background: none; border: none;
    font-family: var(--font); font-size: 9px;
    color: var(--gray); cursor: pointer;
    padding: 2px 6px;
    transition: color .15s;
  }
  .cat-row-btn:hover { color: var(--black); }
  .cat-row-btn.danger:hover { color: #c0392b; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--black); color: var(--bg);
    font-size: 10px; letter-spacing: 0.4px;
    padding: 8px 20px; border-radius: 2px;
    opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 9999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">Rizzi <span>CMS</span></div>
  <div class="header-actions">
    <button class="btn-text" onclick="exportAll()">Export JSON</button>
    <button class="btn-text" id="btn-tag-ai" onclick="tagAllImages()">✦ Tag AI</button>
    <button class="btn-text" onclick="showNewCategoryModal()">+ Categoria</button>
    <button class="btn-text" onclick="toggleTheme()">☽</button>
    <button class="btn-text primary" onclick="showNewProjectModal()">+ Progetto</button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Progetti</h2>
      <span id="project-count" style="font-size:9px;color:var(--gray)">0</span>
    </div>
    <div class="section-filters" id="section-filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tutti</button>
    </div>
    <div class="project-list" id="project-list"></div>
  </aside>

  <!-- EDITOR -->
  <main class="editor" id="editor">
    <div class="editor-empty" id="editor-empty">
      <div style="text-align:center">
        <div style="margin-bottom:24px">Seleziona un progetto o creane uno nuovo</div>
        <div id="cat-manager-panel" class="cat-manager" style="text-align:left;max-width:400px;margin:0 auto">
          <h4>Gestione Sezioni (Categorie)</h4>
          <div class="cat-list" id="cat-list-ui"></div>
          <div style="margin-top:10px">
            <button class="btn-text" onclick="showNewCategoryModal()" style="font-size:9px">+ Nuova sezione</button>
          </div>
        </div>
      </div>
    </div>
    <div id="editor-content" style="display:none">
      <div class="editor-title" id="editor-project-title">—</div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('info',this)">Info</button>
        <button class="tab-btn" onclick="switchTab('images',this)">Foto</button>
        <button class="tab-btn" onclick="switchTab('texts',this)">Testi</button>
      </div>

      <!-- TAB: INFO -->
      <div class="tab-panel active" id="tab-info">
        <div class="field-group">
          <div class="field">
            <label>Titolo</label>
            <input type="text" id="f-title" oninput="livePreview()">
          </div>
          <div class="field">
            <label>Anno</label>
            <input type="text" id="f-year" placeholder="2024" oninput="livePreview()">
          </div>
        </div>
        <div class="field-group">
          <div class="field">
            <label>Luogo</label>
            <input type="text" id="f-place" placeholder="Tokyo" oninput="livePreview()">
          </div>
          <div class="field">
            <label>Pubblicazione</label>
            <input type="text" id="f-publication" placeholder="Vogue Italia" oninput="livePreview()">
          </div>
        </div>
        <div class="field-group">
          <div class="field">
            <label>Sezione (Categoria)</label>
            <select id="f-category-id" onchange="livePreview()">
              <option value="">— Nessuna —</option>
            </select>
          </div>
          <div class="field" style="display:flex;align-items:flex-end">
            <button class="btn-text" style="font-size:9px;letter-spacing:.4px" onclick="showNewCategoryModal()">+ Nuova sezione</button>
          </div>
        </div>
        <div class="field-group full">
          <div class="field">
            <label>Sottotitolo</label>
            <input type="text" id="f-subtitle" oninput="livePreview()">
          </div>
        </div>
        <div class="field-group full">
          <div class="field">
            <label>Descrizione breve</label>
            <textarea id="f-description" rows="3" oninput="livePreview()"></textarea>
          </div>
        </div>
        <div class="field-group">
          <div class="field">
            <label>Tecnica</label>
            <input type="text" id="f-technique" placeholder="Stampa ai sali d'argento" oninput="livePreview()">
          </div>
          <div class="field">
            <label>Supporto / Medium</label>
            <input type="text" id="f-medium" placeholder="Carta baritata" oninput="livePreview()">
          </div>
        </div>
        <div class="field-group">
          <div class="field">
            <label>Stampe (n. esemplari)</label>
            <input type="text" id="f-prints" placeholder="5" oninput="livePreview()">
          </div>
          <div class="field">
            <label>Edizioni</label>
            <input type="text" id="f-editions" placeholder="1/5" oninput="livePreview()">
          </div>
        </div>
        <div class="field-group full">
          <div class="field">
            <label style="display:flex;align-items:center;gap:8px">
              Keywords manuali (progetto)
              <span style="font-size:9px;font-weight:400;color:#888;letter-spacing:.3px">(separate da virgola — si aggiungono a IPTC e AI, non le sostituiscono)</span>
            </label>
            <input type="text" id="f-keywords" placeholder="architettura, bianco e nero, Istanbul" oninput="livePreview()">
          </div>
        </div>
        <button class="save-btn" onclick="saveProjectInfo()">Salva</button>
      </div>

      <!-- TAB: FOTO -->
      <div class="tab-panel" id="tab-images">
        <div class="upload-zone" id="upload-zone"
             onclick="document.getElementById('file-input').click()"
             ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFiles(event)">
          <p>Trascina le foto qui</p>
          <small>JPG · PNG · WEBP · TIFF — multipli selezionabili</small>
        </div>
        <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.webp,.tiff,.tif"
               style="display:none" onchange="uploadFiles(this.files)">
        <!-- Toolbar IPTC / AI -->
        <div class="images-toolbar" id="images-toolbar" style="display:none">
          <button class="btn-text" onclick="rescanIptcAll()">↻ Rescan IPTC</button>
          <button class="btn-text" id="btn-tag-ai-proj" onclick="tagProjectImages()">✶ Tag AI (questo progetto)</button>
          <span id="iptc-status" class="iptc-status-bar" style="flex:1"></span>
        </div>
        <div class="image-grid" id="image-grid"></div>
      </div>

      <!-- TAB: TESTI -->
      <div class="tab-panel" id="tab-texts">
        <div class="text-blocks" id="text-blocks"></div>
        <div class="add-block-bar">
          <button class="add-block-btn" onclick="addBlock('body')">+ Testo</button>
          <button class="add-block-btn" onclick="addBlock('pullquote')">+ Pull quote</button>
          <button class="add-block-btn" onclick="addBlock('caption')">+ Didascalia</button>
          <button class="add-block-btn" onclick="addBlock('question')">+ Domanda</button>
          <button class="add-block-btn" onclick="addBlock('answer')">+ Risposta</button>
        </div>
      </div>
    </div>
  </main>

  <!-- PREVIEW -->
  <aside class="preview-panel">
    <div class="preview-header">
      <h3>Preview</h3>
      <button class="btn-text" onclick="togglePreviewTheme()">Light / Dark</button>
    </div>
    <div class="preview-body" id="preview-body">
      <div style="color:var(--gray);font-size:10px;text-align:center;margin-top:60px">
        Seleziona un progetto
      </div>
    </div>
  </aside>

</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5151/api';
let currentProject = null;
let currentFilter  = 'all';
let previewDark    = false;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  await loadCategories();
  await loadProjects();
  renderCategoryManager();
}

// ─────────────────────────────────────────────
// CATEGORIES
// ─────────────────────────────────────────────
let allCategories = [];

async function loadCategories() {
  const res = await fetch(`${API}/categories`);
  allCategories = await res.json();
  renderCategoryFilters();
  renderCategorySelect();
}

function renderCategoryFilters() {
  const container = document.getElementById('section-filters');
  container.innerHTML = `<button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tutti</button>`;
  allCategories.filter(c => c.visible).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = cat.id;
    btn.textContent = cat.name;
    btn.onclick = function() { setFilter(cat.id, this); };
    container.appendChild(btn);
  });
}

function renderCategorySelect() {
  const sel = document.getElementById('f-category-id');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Nessuna —</option>';
  allCategories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.name;
    sel.appendChild(opt);
  });
  if (currentProject) sel.value = currentProject.category_id || '';
}

async function showNewCategoryModal() {
  const name = prompt('Nome della nuova sezione (es. Cities, Portraits, Projects):');
  if (!name) return;
  const res = await fetch(`${API}/categories`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: name.trim() })
  });
  const cat = await res.json();
  allCategories.push(cat);
  renderCategoryFilters();
  renderCategorySelect();
  renderCategoryManager();
  toast(`Sezione "${cat.name}" creata`);
}

function renderCategoryManager() {
  const list = document.getElementById('cat-list-ui');
  if (!list) return;
  list.innerHTML = '';
  if (allCategories.length === 0) {
    list.innerHTML = '<div style="font-size:10px;color:var(--gray)">Nessuna sezione. Creane una con il pulsante qui sotto.</div>';
    return;
  }
  const sorted = [...allCategories].sort((a, b) => (a.order || 0) - (b.order || 0));
  sorted.forEach((cat, idx) => {
    // Conta i progetti assegnati
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <span class="cat-row-name">${cat.name}</span>
      <span class="cat-row-count" id="cat-count-${cat.id}">...</span>
      <button class="cat-row-btn" onclick="moveCategoryUp('${cat.id}')" title="Su">↑</button>
      <button class="cat-row-btn" onclick="moveCategoryDown('${cat.id}')" title="Giù">↓</button>
      <button class="cat-row-btn" onclick="renameCategory('${cat.id}', '${cat.name}')">Rinomina</button>
      <button class="cat-row-btn danger" onclick="deleteCategory('${cat.id}', '${cat.name}')">Elimina</button>
    `;
    list.appendChild(row);
  });
  // Conta i progetti per ogni categoria
  fetch(`${API}/projects`).then(r => r.json()).then(projects => {
    sorted.forEach(cat => {
      const count = projects.filter(p => p.category_id === cat.id).length;
      const el = document.getElementById('cat-count-' + cat.id);
      if (el) el.textContent = count + ' progett' + (count === 1 ? 'o' : 'i');
    });
  });
}

async function renameCategory(cid, currentName) {
  const name = prompt('Nuovo nome per la sezione:', currentName);
  if (!name || name.trim() === currentName) return;
  await fetch(`${API}/categories/${cid}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: name.trim() })
  });
  const cat = allCategories.find(c => c.id === cid);
  if (cat) cat.name = name.trim();
  renderCategoryFilters();
  renderCategorySelect();
  renderCategoryManager();
  toast(`Sezione rinominata in "${name.trim()}"`);
}

async function deleteCategory(cid, catName) {
  const count = (await (await fetch(`${API}/projects?category_id=${cid}`)).json()).length;
  const msg = count > 0
    ? `Eliminare la sezione "${catName}"? I ${count} progetti assegnati rimarranno ma senza sezione.`
    : `Eliminare la sezione "${catName}"?`;
  if (!confirm(msg)) return;
  await fetch(`${API}/categories/${cid}`, { method: 'DELETE' });
  allCategories = allCategories.filter(c => c.id !== cid);
  renderCategoryFilters();
  renderCategorySelect();
  renderCategoryManager();
  toast(`Sezione "${catName}" eliminata`);
}

async function moveCategoryUp(cid) {
  const sorted = [...allCategories].sort((a, b) => (a.order || 0) - (b.order || 0));
  const idx = sorted.findIndex(c => c.id === cid);
  if (idx <= 0) return;
  // Scambia order con il precedente
  const prev = sorted[idx - 1];
  const curr = sorted[idx];
  const tmpOrder = curr.order;
  curr.order = prev.order;
  prev.order = tmpOrder;
  await fetch(`${API}/categories/${curr.id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ order: curr.order })
  });
  await fetch(`${API}/categories/${prev.id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ order: prev.order })
  });
  renderCategoryFilters();
  renderCategorySelect();
  renderCategoryManager();
}

async function moveCategoryDown(cid) {
  const sorted = [...allCategories].sort((a, b) => (a.order || 0) - (b.order || 0));
  const idx = sorted.findIndex(c => c.id === cid);
  if (idx >= sorted.length - 1) return;
  const next = sorted[idx + 1];
  const curr = sorted[idx];
  const tmpOrder = curr.order;
  curr.order = next.order;
  next.order = tmpOrder;
  await fetch(`${API}/categories/${curr.id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ order: curr.order })
  });
  await fetch(`${API}/categories/${next.id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ order: next.order })
  });
  renderCategoryFilters();
  renderCategorySelect();
  renderCategoryManager();
}

// ─────────────────────────────────────────────
// PROJECTS
// ─────────────────────────────────────────────
async function loadProjects() {
  const url = currentFilter === 'all'
    ? `${API}/projects`
    : `${API}/projects?category_id=${currentFilter}`;
  const res  = await fetch(url);
  const data = await res.json();
  renderProjectList(data);
}

function renderProjectList(projects) {
  const list = document.getElementById('project-list');
  document.getElementById('project-count').textContent = projects.length;
  list.innerHTML = '';
  projects.forEach(p => {
    const item = document.createElement('div');
    item.className = 'project-item' + (currentProject?.id === p.id ? ' active' : '');
    item.onclick = () => openProject(p.id);
    const catName = allCategories.find(c => c.id === p.category_id)?.name || p.category_id || '—';
    item.innerHTML = `
      <div class="section-dot ${p.category_id || 'archive'}"></div>
      <div class="project-item-info">
        <div class="project-item-title">${p.title}</div>
        <div class="project-item-meta">
          <span>${p.year || '—'}</span>
          <span>${catName}</span>
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

async function openProject(pid) {
  const res = await fetch(`${API}/projects/${pid}`);
  currentProject = await res.json();
  renderEditor();
  renderPreview();
  await loadProjects();
}

function renderEditor() {
  const p = currentProject;
  document.getElementById('editor-empty').style.display   = 'none';
  document.getElementById('editor-content').style.display = 'block';
  document.getElementById('editor-project-title').textContent = p.title;

  document.getElementById('f-title').value       = p.title || '';
  document.getElementById('f-year').value        = p.year || '';
  document.getElementById('f-place').value       = p.place || '';
  document.getElementById('f-publication').value = p.publication || '';
  const catSel = document.getElementById('f-category-id');
  if (catSel) catSel.value = p.category_id || '';
  document.getElementById('f-subtitle').value    = p.subtitle || '';
  document.getElementById('f-description').value = p.description || '';
  document.getElementById('f-technique').value   = p.technique || '';
  document.getElementById('f-medium').value      = p.medium || '';
  document.getElementById('f-prints').value      = p.prints || '';
  document.getElementById('f-editions').value    = p.editions || '';
  document.getElementById('f-keywords').value    = p.keywords_manual || '';

  renderImageGrid();
  renderTextBlocks();
  updateIptcStatusBar();
}

async function saveProjectInfo() {
  if (!currentProject) return;
  const body = {
    title:           document.getElementById('f-title').value,
    year:            document.getElementById('f-year').value,
    place:           document.getElementById('f-place').value,
    publication:     document.getElementById('f-publication').value,
    category_id:     document.getElementById('f-category-id').value || null,
    subtitle:        document.getElementById('f-subtitle').value,
    description:     document.getElementById('f-description').value,
    technique:       document.getElementById('f-technique').value,
    medium:          document.getElementById('f-medium').value,
    prints:          document.getElementById('f-prints').value,
    editions:        document.getElementById('f-editions').value,
    keywords_manual: document.getElementById('f-keywords').value,
  };
  await fetch(`${API}/projects/${currentProject.id}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  currentProject = {...currentProject, ...body};
  document.getElementById('editor-project-title').textContent = body.title;
  await loadProjects();
  renderPreview();
  toast('Salvato');
}

async function showNewProjectModal() {
  const title = prompt('Titolo del progetto:');
  if (!title) return;
  const year = prompt('Anno:', new Date().getFullYear()) || '';
  // Mostra le categorie disponibili
  const catList = allCategories.map((c,i) => `${i+1}) ${c.name}`).join('\n');
  const catIdx  = parseInt(prompt(`Scegli la categoria:\n${catList}\n\nNumero:`, '1')) - 1;
  const category_id = allCategories[catIdx]?.id || allCategories[0]?.id || null;
  const res = await fetch(`${API}/projects`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title, category_id, year })
  });
  const p = await res.json();
  await loadCategories();
  await openProject(p.id);
}

// ─────────────────────────────────────────────
// IMAGES
// ─────────────────────────────────────────────
function getKwBadgeInfo(img) {
  // Determina se le keyword sono IPTC, AI o manuali
  // Usa i campi iptc_keywords e ai_keywords se presenti, altrimenti usa keywords
  const hasIptc = !!(img.iptc_keywords && img.iptc_keywords.trim());
  const hasAi   = !!(img.ai_keywords   && img.ai_keywords.trim());
  const hasKw   = !!(img.keywords      && img.keywords.trim());
  const kwCount = hasKw ? img.keywords.split(',').filter(k => k.trim()).length : 0;
  if (hasIptc && hasAi) return { cls: 'has-both', label: 'IPTC+AI', count: kwCount };
  if (hasIptc)          return { cls: 'has-iptc', label: 'IPTC',    count: kwCount };
  if (hasAi)            return { cls: 'has-ai',   label: 'AI',      count: kwCount };
  if (hasKw)            return { cls: 'has-iptc', label: 'KW',      count: kwCount };
  return { cls: 'no-kw', label: '—', count: 0 };
}

function updateIptcStatusBar() {
  const imgs = currentProject ? (currentProject.images || []) : [];
  const toolbar = document.getElementById('images-toolbar');
  const status  = document.getElementById('iptc-status');
  if (!toolbar || !status) return;
  toolbar.style.display = imgs.length > 0 ? 'flex' : 'none';
  const withKw  = imgs.filter(i => i.keywords && i.keywords.trim()).length;
  const withIptc = imgs.filter(i => i.iptc_keywords && i.iptc_keywords.trim()).length;
  const withAi   = imgs.filter(i => i.ai_keywords   && i.ai_keywords.trim()).length;
  status.innerHTML = `<strong>${withKw}/${imgs.length}</strong> foto con keyword &nbsp;·&nbsp; <strong>${withIptc}</strong> IPTC &nbsp;·&nbsp; <strong>${withAi}</strong> AI`;
}

function renderImageGrid() {
  const grid = document.getElementById('image-grid');
  grid.innerHTML = '';
  (currentProject.images || []).forEach((img, idx) => {
    const cell = document.createElement('div');
    cell.className = 'image-cell';
    const badge = getKwBadgeInfo(img);
    cell.innerHTML = `
      <img src="http://localhost:5151/uploads/${img.thumb || img.file}" alt="" loading="lazy">
      <span class="img-kw-badge ${badge.cls}">${badge.label}</span>
      ${badge.count > 0 ? `<span class="img-kw-count">${badge.count} kw</span>` : ''}
      <div class="img-overlay">
        <div class="img-actions">
          <button class="img-action-btn" onclick="showImgKeywords('${img.id}')" title="Vedi keyword">KW</button>
          <button class="img-action-btn" onclick="rescanIptcSingle('${img.id}')" title="Rescan IPTC">↻</button>
          <button class="img-action-btn" onclick="tagSingleImageAi('${img.id}')" title="Tag AI">✶</button>
          <button class="img-action-btn danger" onclick="deleteImage('${img.id}')" title="Elimina">×</button>
        </div>
      </div>
      ${img.caption ? `<div class="img-caption">${img.caption}</div>` : ''}
    `;
    grid.appendChild(cell);
  });
  updateIptcStatusBar();
}

async function uploadFiles(files) {
  if (!currentProject || !files.length) return;
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  const res = await fetch(`${API}/projects/${currentProject.id}/images`, {
    method: 'POST', body: fd
  });
  const imgs = await res.json();
  currentProject.images = [...(currentProject.images || []), ...imgs];
  renderImageGrid();
  renderPreview();
  toast(`${imgs.length} foto caricate`);
}

async function deleteImage(iid) {
  if (!confirm('Eliminare questa foto?')) return;
  await fetch(`${API}/projects/${currentProject.id}/images/${iid}`, { method: 'DELETE' });
  currentProject.images = currentProject.images.filter(i => i.id !== iid);
  renderImageGrid();
  renderPreview();
  toast('Foto eliminata');
}

// Mostra le keyword di una singola foto in un alert leggibile
function showImgKeywords(iid) {
  const img = (currentProject.images || []).find(i => i.id === iid);
  if (!img) return;
  const kw = img.keywords || '';
  const iptc = img.iptc_keywords || '';
  const ai   = img.ai_keywords   || '';
  let msg = `KEYWORDS FOTO\n`;
  msg += `\nTutte (usate dal sito):\n${kw || '(nessuna)'}\n`;
  if (iptc) msg += `\nIPTC originali:\n${iptc}`;
  if (ai)   msg += `\nAI generate:\n${ai}`;
  alert(msg);
}

// Rescan IPTC per una singola foto
async function rescanIptcSingle(iid) {
  const pid = currentProject.id;
  try {
    const res  = await fetch(`${API}/projects/${pid}/images/${iid}/rescan-iptc`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      // Aggiorna il record locale
      const img = (currentProject.images || []).find(i => i.id === iid);
      if (img && data.keywords !== undefined) img.keywords = data.keywords;
      renderImageGrid();
      toast(`IPTC: ${data.iptc_found} keyword trovate`);
    } else {
      toast('File non trovato su disco — IPTC non disponibile');
    }
  } catch(e) {
    toast('Errore rescan IPTC');
  }
}

// Rescan IPTC per tutte le foto del progetto corrente
async function rescanIptcAll() {
  const pid = currentProject.id;
  try {
    const res  = await fetch(`${API}/projects/${pid}/rescan-iptc-all`, { method: 'POST' });
    const data = await res.json();
    // Ricarica il progetto per aggiornare le keyword
    const pRes = await fetch(`${API}/projects/${pid}`);
    const p    = await pRes.json();
    currentProject.images = p.images;
    renderImageGrid();
    toast(`IPTC rescanned: ${data.updated} foto aggiornate`);
  } catch(e) {
    toast('Errore rescan IPTC');
  }
}

// Tag AI per una singola foto
async function tagSingleImageAi(iid) {
  const pid = currentProject.id;
  const btn = event.target;
  btn.textContent = '⧗';
  btn.disabled = true;
  try {
    const res  = await fetch(`${API}/projects/${pid}/images/${iid}/tag-ai`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      toast('✶ Tag AI avviato — aggiorna tra qualche secondo');
      // Ricarica dopo 4 secondi
      setTimeout(async () => {
        const pRes = await fetch(`${API}/projects/${pid}`);
        const p    = await pRes.json();
        currentProject.images = p.images;
        renderImageGrid();
      }, 4000);
    }
  } catch(e) {
    toast('Errore Tag AI');
  } finally {
    btn.textContent = '✶';
    btn.disabled = false;
  }
}

// Tag AI per tutte le foto del progetto corrente (senza keyword)
async function tagProjectImages() {
  const pid = currentProject.id;
  const btn = document.getElementById('btn-tag-ai-proj');
  if (btn) { btn.disabled = true; btn.textContent = '⧗ AI in corso…'; }
  try {
    // Avvia tag AI solo per le foto di questo progetto senza keyword
    const imgs = (currentProject.images || []).filter(i => !i.keywords || !i.keywords.trim());
    if (imgs.length === 0) {
      toast('Tutte le foto hanno già keyword ✔');
      return;
    }
    let started = 0;
    for (const img of imgs) {
      await fetch(`${API}/projects/${pid}/images/${img.id}/tag-ai`, { method: 'POST' });
      started++;
    }
    toast(`✶ Tag AI avviato per ${started} foto`);
    // Ricarica dopo 6 secondi
    setTimeout(async () => {
      const pRes = await fetch(`${API}/projects/${pid}`);
      const p    = await pRes.json();
      currentProject.images = p.images;
      renderImageGrid();
    }, 6000);
  } catch(e) {
    toast('Errore Tag AI progetto');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✶ Tag AI (questo progetto)'; }
  }
}

function dragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('drag-over');
}
function dragLeave(e) {
  document.getElementById('upload-zone').classList.remove('drag-over');
}
function dropFiles(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
}

// ─────────────────────────────────────────────
// TEXTS
// ─────────────────────────────────────────────
function renderTextBlocks() {
  const container = document.getElementById('text-blocks');
  container.innerHTML = '';
  (currentProject.texts || []).forEach(block => {
    const div = document.createElement('div');
    div.className = 'text-block';
    div.innerHTML = `
      <div class="text-block-header">
        <span class="block-type-badge ${block.type}">${block.type}</span>
      </div>
      <button class="block-del-btn" onclick="deleteBlock('${block.id}')">×</button>
      <textarea oninput="updateBlockContent('${block.id}', this.value)"
                onblur="saveBlock('${block.id}', this.value)"
                rows="3">${block.content || ''}</textarea>
    `;
    container.appendChild(div);
  });
}

async function addBlock(type) {
  if (!currentProject) return;
  const res = await fetch(`${API}/projects/${currentProject.id}/texts`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ type, content: '' })
  });
  const block = await res.json();
  if (!currentProject.texts) currentProject.texts = [];
  currentProject.texts.push(block);
  renderTextBlocks();
  renderPreview();
}

function updateBlockContent(tid, value) {
  const block = currentProject.texts.find(t => t.id === tid);
  if (block) block.content = value;
  renderPreview();
}

async function saveBlock(tid, value) {
  if (!currentProject) return;
  await fetch(`${API}/projects/${currentProject.id}/texts/${tid}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content: value })
  });
}

async function deleteBlock(tid) {
  await fetch(`${API}/projects/${currentProject.id}/texts/${tid}`, { method: 'DELETE' });
  currentProject.texts = currentProject.texts.filter(t => t.id !== tid);
  renderTextBlocks();
  renderPreview();
}

// ─────────────────────────────────────────────
// PREVIEW
// ─────────────────────────────────────────────
function renderPreview() {
  const p = currentProject;
  if (!p) return;
  const body = document.getElementById('preview-body');
  const cover = p.images && p.images[0]
    ? `<img class="preview-cover" src="http://localhost:5151/uploads/${p.images[0].thumb || p.images[0].file}" alt="">`
    : `<div class="preview-cover" style="background:var(--light)"></div>`;

  const thumbs = (p.images || []).slice(1, 9).map(img =>
    `<img src="http://localhost:5151/uploads/${img.thumb || img.file}" alt="">`
  ).join('');

  const texts = (p.texts || []).map(block => {
    switch (block.type) {
      case 'pullquote': return `<div class="preview-text-block"><div class="preview-pullquote">${block.content}</div></div>`;
      case 'caption':   return `<div class="preview-text-block"><div class="preview-caption">${block.content}</div></div>`;
      case 'question':  return `<div class="preview-text-block"><div class="preview-question">${block.content}</div></div>`;
      case 'answer':    return `<div class="preview-text-block"><div class="preview-answer">${block.content}</div></div>`;
      default:          return `<div class="preview-text-block"><div class="preview-body-text">${block.content}</div></div>`;
    }
  }).join('');

  const techMeta = [p.technique, p.medium, p.prints ? `${p.prints} stampe` : '', p.editions ? `ed. ${p.editions}` : ''].filter(Boolean).join(' · ');
  const kwCount  = (currentProject.images || []).reduce((acc, i) => acc + (i.keywords ? i.keywords.split(',').filter(k=>k.trim()).length : 0), 0);
  body.innerHTML = `
    <div class="preview-meta">
      <span>${p.year || '—'}</span>
      <span>·</span>
      <span>${p.place || '—'}</span>
      <span>·</span>
      <span>${allCategories.find(c=>c.id===p.category_id)?.name || p.category_id || '—'}</span>
    </div>
    <div class="preview-project-title">${p.title}</div>
    ${p.subtitle ? `<div style="font-size:11px;color:var(--gray);margin-bottom:12px">${p.subtitle}</div>` : ''}
    ${techMeta ? `<div style="font-size:9px;color:var(--gray);letter-spacing:.4px;margin-bottom:8px">${techMeta}</div>` : ''}
    ${kwCount > 0 ? `<div style="font-size:9px;color:var(--gray);margin-bottom:8px">✶ ${kwCount} keyword totali</div>` : ''}
    <hr class="preview-divider">
    ${cover}
    ${thumbs ? `<div class="preview-thumbs">${thumbs}</div>` : ''}
    ${texts}
  `;
}

function livePreview() {
  if (!currentProject) return;
  currentProject.title       = document.getElementById('f-title').value;
  currentProject.year        = document.getElementById('f-year').value;
  currentProject.place       = document.getElementById('f-place').value;
  currentProject.subtitle    = document.getElementById('f-subtitle').value;
  currentProject.category_id = document.getElementById('f-category-id')?.value || null;
  currentProject.technique   = document.getElementById('f-technique')?.value || '';
  currentProject.medium      = document.getElementById('f-medium')?.value || '';
  currentProject.prints      = document.getElementById('f-prints')?.value || '';
  currentProject.editions    = document.getElementById('f-editions')?.value || '';
  document.getElementById('editor-project-title').textContent = currentProject.title;
  renderPreview();
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadProjects();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
}

function togglePreviewTheme() {
  previewDark = !previewDark;
  const panel = document.querySelector('.preview-panel');
  panel.style.background = previewDark ? '#0e0e0e' : '';
  panel.style.color      = previewDark ? '#f0f0f0' : '';
}

async function exportAll() {
  const res  = await fetch(`${API}/export`);
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'rizzi-export.json';
  a.click();
  toast('Export completato');
}

async function tagAllImages() {
  // Tag AI globale: avvia per TUTTE le foto di TUTTI i progetti senza keyword
  const btn = document.getElementById('btn-tag-ai');
  btn.disabled = true;
  btn.textContent = '⧗ Analisi in corso…';
  try {
    const res  = await fetch(`${API}/tag-all`, { method: 'POST' });
    const data = await res.json();
    const n = data.started || 0;
    if (n === 0) {
      toast('Tutte le foto hanno già le keyword AI ✔');
    } else {
      toast(`✶ Tag AI avviato per ${n} foto (tutti i progetti) — pronto in pochi minuti`);
    }
  } catch(e) {
    toast('Errore durante il Tag AI');
  } finally {
    btn.disabled = false;
    btn.textContent = '✶ Tag AI (globale)';
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

init();
</script>
