<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rizzi — Proposta Integrazione</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════════════════════
       VARIABILI — ereditate da rizzi-web + palette Angelucci
    ══════════════════════════════════════════════════════════════ */
    :root {
      --black:        #000;
      --white:        #fff;
      --gray:         #666;
      --light:        #e7e7e7;
      --accent:       #6a49be;
      --accent-light: #9670b2;
      --yellow:       #ffd600;
      --orange:       #ff8c00;
      --pad:          0px;
      --nav-h:        36px;
      --footer-h:     0px;
      --font:         'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-nav:     'EB Garamond', Georgia, 'Times New Roman', serif;
      --ease-custom:  cubic-bezier(.77, 0, .175, 1);
      --ease-out:     cubic-bezier(.4, 0, .2, 1);
    }
    [data-theme="dark"] {
      --black:  #fff;
      --white:  #000;
      --gray:   #aaa;
      --light:  #333;
    }

    /* ══════════════════════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      font-size: 11px;
      line-height: 16px;
      letter-spacing: 0.4px;
      background: var(--white);
      color: var(--black);
      cursor: none;
      overflow: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* ══════════════════════════════════════════════════════════════
       CURSORE CUSTOM (jackdavison + rizzi-web)
    ══════════════════════════════════════════════════════════════ */
    /* Pallino cursore — solido, mix-blend-mode difference */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: none;
      pointer-events: none;
      z-index: 9999;
      /* translate centrato + scale per animazione hover */
      transform: translate(-50%, -50%) scale(1);
      mix-blend-mode: difference;
      transition: transform .2s var(--ease-out);
    }
    /* Hover: pulsazione via scale */
    #cursor.hover {
      animation: cursorPulse .7s ease-in-out infinite;
    }
    @keyframes cursorPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   }
      50%       { transform: translate(-50%, -50%) scale(1.8); }
    }
    #cursor-label {
      position: fixed;
      font-size: 22px;
      letter-spacing: 0;
      color: var(--black);
      pointer-events: none;
      z-index: 9998;
      transform: translate(14px, -50%);
      opacity: 0;
      transition: opacity .15s;
      white-space: nowrap;
      font-weight: 300;
    }
    #cursor-label.show { opacity: 1; }

    /* ══════════════════════════════════════════════════════════════
       LANDING PAGE HERO
    ══════════════════════════════════════════════════════════════ */
    #landing {
      position: fixed; inset: 0;
      z-index: 1000;
      background: transparent;
      cursor: none;
      overflow: hidden;
    }
    /* Foto a tutto schermo — sempre visibile, copre tutto */
    #landing-photo {
      position: absolute; inset: 0;
      background: url('images/landing-hero.webp') center center / cover no-repeat;
      z-index: 1;
    }
    /* Banda bianca in cima alla foto (visibile quando la banda nera sale) */
    #landing-photo::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: #fff;
      z-index: 2;
    }
    /* Lettering in alto a sinistra — appare quando la banda sale */
    #landing-text {
      position: absolute;
      top: 8px;
      left: 16px;
      font-family: var(--font-nav);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0;
      transition: opacity 0.6s ease 0.5s;
      pointer-events: none;
      z-index: 4;
    }
    #landing.band-up #landing-text {
      opacity: 1;
    }
    /* Banda nera — occupa metà schermo in alto, poi sale fuori */
    #landing-band {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50vh;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 16px 16px 40px;
      transform: translateY(0);
      transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
      z-index: 3;
    }
    #landing.band-up #landing-band {
      transform: translateY(-100%);
    }
    /* Nome in alto nella banda */
    #landing-band .lband-name {
      font-family: var(--font-nav);
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    /* Sottotitolo nella banda */
    #landing-band .lband-subtitle {
      font-family: var(--font-nav);
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.06em;
    }
    /* Quando la banda sale: la foto rimane, click ovunque → Overview */
    #landing.band-up {
      cursor: none;
    }
    /* Nasconde la landing dopo l'uscita */
    #landing.gone {
      pointer-events: none;
      display: none;
    }
    @keyframes textIn {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 1; }
    }

    /* ══════════════════════════════════════════════════════════════
       LAYOUT SHELL
    ══════════════════════════════════════════════════════════════ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ══════════════════════════════════════════════════════════════
       NAVBAR (rizzi-web + pill centrephotogeneve)
    ══════════════════════════════════════════════════════════════ */
    header {
      position: relative;
      height: var(--nav-h);
      padding: 0 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
      /* Nessuna linea separatrice — Miechowski style */
    }
    /* Nessuna riga separatrice — stile Miechowski/Angelucci */
    .logo {
      font-family: var(--font-nav);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: none;
      /* Allineato al margine sx della griglia (padding header = 12px) */
    }
    .logo span { color: #000; }

    /* Nav — testo puro, nessun box/pill */
    nav.pill-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    nav.pill-nav button,
    nav.pill-nav a {
      font-family: var(--font-nav);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      background: none !important;
      background-color: transparent !important;
      color: var(--black);
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      -webkit-appearance: none;
      appearance: none;
      padding: 0;
      margin: 0;
      cursor: none;
      transition: color .15s;
      display: inline-block;
      text-decoration: none;
      border-radius: 0 !important;
    }
    nav.pill-nav button:hover,
    nav.pill-nav a:hover {
      color: #000;
      opacity: 0.6;
    }
    nav.pill-nav button.active {
      color: #000;
      font-weight: 700;
    }
    /* Pulsante Aggiorna — solo localhost */
    #btn-update {
      color: var(--accent) !important;
      font-weight: 700 !important;
      opacity: 0.7;
    }
    #btn-update:hover { opacity: 1 !important; }
    #btn-update.updating { opacity: 0.4 !important; pointer-events: none; }
    /* Menu, Theme e Screensaver — nero pieno */
    nav.pill-nav #btn-menu,
    nav.pill-nav #btn-theme,
    nav.pill-nav #btn-screensaver {
      color: #000;
    }
    nav.pill-nav #btn-theme {
      font-size: 13px;
      margin-left: 4px;
    }

    /* ══════════════════════════════════════════════════════════════
       MAIN AREA
    ══════════════════════════════════════════════════════════════ */
    main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ══════════════════════════════════════════════════════════════
       VIEWS (pagine)
    ══════════════════════════════════════════════════════════════ */
    .view {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: var(--pad);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .4s var(--ease-custom),
                  transform .4s var(--ease-custom);
    }
    .view.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    /* ══════════════════════════════════════════════════════════════
       VIEW: HOME — THUMBS GRID (jackdavison / Miechowski)
       Thumbnail piccole con aspect ratio naturali, molte colonne
    ══════════════════════════════════════════════════════════════ */
    #view-home {
      padding: 0;
      overflow-y: auto;
      /* Griglia parte subito dall'alto, nessun margine */
      display: flex;
      flex-direction: column;
    }
    #view-home .thumbs-grid {
      /* CSS Grid: Miechowski style — 9 colonne fisse, celle quadrate */
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-auto-rows: calc((100vw - 32px) / 9);
      gap: 4px;
      padding: 0 16px;
      margin-top: 0;
    }
    #view-home .thumbs-grid .thumb-item {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: none;
      background: #fff;
    }
    #view-home .thumbs-grid .thumb-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: opacity .25s var(--ease-out);
    }
    #view-home .thumbs-grid .thumb-item:hover img {
      opacity: .75;
    }
    /* Spazio vuoto Miechowski — cella intera vuota */
    #view-home .thumbs-grid .thumb-blank {
      background: transparent;
    }
    /* Nome progetto fisso sopra la griglia — centrato, stile Miechowski */
    #overview-project-name {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 16px 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--black);
      background: var(--white);
      text-align: center;
      min-height: 38px;
      transition: color .2s;
      pointer-events: none;
    }
    [data-theme="dark"] #overview-project-name {
      background: #000;
      color: #fff;
    }

    /* Overlay preview — jackdavison style */
    #overview-overlay {
      position: fixed; inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      visibility: hidden;
    }
    #overview-overlay.open {
      pointer-events: all;
      visibility: visible;
    }
    /* Sfondo sfumato come jackdavison */
    #overview-overlay-bg {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(1px);
      opacity: 0;
      transition: opacity .3s var(--ease-custom);
    }
    #overview-overlay.open #overview-overlay-bg { opacity: 1; }
    #overview-overlay-img {
      position: relative;
      z-index: 1;
      max-width: 65vw;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      /* Animazione jackdavison: si svolge dall'alto verso il basso */
      clip-path: inset(0 0 100% 0);
      transition: clip-path .7s cubic-bezier(.77, 0, .175, 1);
    }
    #overview-overlay.open #overview-overlay-img {
      clip-path: inset(0 0 0% 0);
    }
    [data-theme="dark"] #overview-overlay-bg {
      background: rgba(0,0,0,.85);
    }
    /* Label in basso — jackdavison */
    #overview-overlay-label {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 10px;
      letter-spacing: 0.4px;
      color: var(--gray);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .3s .15s;
    }
    #overview-overlay.open #overview-overlay-label { opacity: 1; }
    /* Tasto chiudi in basso al centro — jackdavison */
    #overview-overlay-close {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      background: none; border: none;
      font-family: var(--font);
      font-size: 10px; letter-spacing: 0.4px;
      color: var(--black);
      cursor: none;
      white-space: nowrap;
    }
    #overview-overlay-close:hover { opacity: .5; }

    /* ══════════════════════════════════════════════════════════════
       VIEW: ARCHIVE — Tabella (rizzi-web)
    ══════════════════════════════════════════════════════════════ */
    #view-archive .archive-header {
      display: flex;
      border-bottom: 1px solid var(--light);
      padding: 6px 0;
      margin-bottom: 0;
    }
    #view-archive .archive-header span {
      font-weight: 900;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.4px;
    }
    .archive-row {
      display: grid;
      grid-template-columns: 70px 1fr 1fr 1fr 1fr 60px;
      gap: 0;
      border-bottom: 1px solid var(--light);
      align-items: center;
      min-height: 36px;
      transition: background .1s, transform .15s;
      cursor: none;
    }
    .archive-row:not(.header):hover {
      background: var(--black);
    }
    .archive-row:not(.header):hover * { color: var(--white); }
    /* skewX al hover — Angelucci */
    .archive-row:not(.header):hover {
      transform: skewX(-2deg);
    }
    .archive-row > div {
      padding: 8px 12px;
      font-size: 11px;
    }
    .archive-row .year { color: var(--gray); }
    .archive-row:hover .year { color: #aaa; }
    .archive-row .keyword {
      color: var(--accent);
      font-weight: 900;
    }

    /* ══════════════════════════════════════════════════════════════
       VIEW: GALLERY — Nadav Kander style
    ══════════════════════════════════════════════════════════════ */
    #view-gallery {
      padding: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    #view-gallery::-webkit-scrollbar { display: none; }

    /* Foto principale centrata */
    .gallery-main-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px var(--pad) 24px;
      min-height: calc(100vh - var(--header-h));
      box-sizing: border-box;
    }
    .gallery-main-img-wrap {
      width: 100%;
      max-width: 680px;
      cursor: none;
    }
    .gallery-main-img-wrap img {
      width: 100%;
      height: auto;
      max-height: calc(var(--vh, 1vh) * 65);
      display: block;
      object-fit: contain;
      /* Stato iniziale: nascosta */
      clip-path: inset(0 0 100% 0);
      transition: none;
    }
    .gallery-main-img-wrap img.revealing {
      clip-path: inset(0 0 0% 0);
      transition: clip-path .75s cubic-bezier(.77, 0, .175, 1);
    }
    .gallery-info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px var(--pad) 16px;
    }
    .gallery-caption {
      font-family: var(--font-nav);
      font-size: 12px;
      color: #4d4d4d;
      line-height: 1.5;
    }
    .gallery-counter-wrap {
      font-family: var(--font-nav);
      font-size: 11px;
      color: #4d4d4d;
      white-space: nowrap;
      margin-left: 16px;
    }

    /* Sezione thumbs — linea + titolo + griglia */
    .gallery-thumbs-section {
      border-top: 1px solid var(--light);
      padding: 0 var(--pad) 32px;
    }
    .gallery-series-title {
      font-family: var(--font-nav);
      font-size: 13px;
      font-weight: 600;
      padding: 14px 0 16px;
      color: var(--black);
    }
    .gallery-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 8px;
      align-items: flex-start;
    }
    .gallery-grid-item {
      cursor: none;
      flex-shrink: 0;
    }
    .gallery-grid-item img {
      height: 156px;
      width: auto;
      display: block;
      object-fit: cover;
      opacity: .65;
      transition: opacity .2s;
    }
    .gallery-grid-item:hover img { opacity: .9; }
    .gallery-grid-item.active img { opacity: 1; }
    .gallery-grid-caption {
      font-family: var(--font-nav);
      font-size: 10px;
      color: #4d4d4d;
      margin-top: 3px;
      line-height: 1.3;
      max-width: 120px;
    }

    /* Sezione testo — linea + descrizione */
    .gallery-text-section {
      border-top: 1px solid var(--light);
      padding: 28px var(--pad) 60px;
      max-width: 680px;
    }
    .gallery-text-title {
      font-family: var(--font-nav);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--black);
    }
    .gallery-text-body {
      font-family: var(--font-nav);
      font-size: 13px;
      line-height: 1.75;
      color: var(--black);
    }
    .gallery-text-meta {
      margin-top: 28px;
      font-family: var(--font-nav);
      font-size: 12px;
      color: #4d4d4d;
    }

    /* ══════════════════════════════════════════════════════════════
       SCREENSAVER — jackdavison
    ══════════════════════════════════════════════════════════════ */
    #screensaver {
      position: fixed; inset: 0;
      z-index: 200;
      background: var(--white);
      display: none;
      opacity: 0;
      transition: opacity .6s;
    }
    #screensaver.active {
      display: block;
      opacity: 1;
    }
    #screensaver .ss-img {
      position: absolute;
      opacity: 0;
      transition: opacity 1.2s;
    }
    #screensaver .ss-img.show { opacity: 1; }
    #screensaver .ss-img img {
      width: auto;
      height: auto;
      max-width: 60vw;
      max-height: 70vh;
    }
    #screensaver .ss-label {
      position: fixed;
      bottom: var(--pad);
      left: var(--pad);
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 0.4px;
    }

    /* ══════════════════════════════════════════════════════════════
       BLINK ANIMATION — centrephotogeneve
    ══════════════════════════════════════════════════════════════ */
    .blink { animation: blink .2s linear infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .2; }
    }

    /* ══════════════════════════════════════════════════════════════
       MENU OVERLAY — centrephotogeneve (slide from top)
    ══════════════════════════════════════════════════════════════ */
    #menu-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 50vh;
      background: var(--black);
      z-index: 500;
      transform: translateY(-102%);
      transition: transform .3s var(--ease-custom);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(var(--nav-h) + 16px) calc(var(--pad) + 24px) 28px;
      cursor: none;
    }
    #menu-overlay.open { transform: translateY(0); }

    /* Menu a colonna singola */
    #menu-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
    }
    .menu-col {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    /* Nascondi colonne 2-4 nel menu overlay (usate solo nella landing) */
    #menu-col-2, #menu-col-3, #menu-col-4 { display: none; }
    .menu-col a {
      font-size: 15px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: 0;
      line-height: 1.9;
      transition: opacity .1s;
      white-space: nowrap;
    }
    .menu-col a:hover { opacity: .5; }
    .menu-col a.bold { font-weight: 700; }

    #menu-overlay ul.secondary {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #menu-overlay ul.secondary li a {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.9;
      color: var(--white);
    }
    #menu-overlay ul.secondary li a:hover { opacity: .5; }

    /* ══════════════════════════════════════════════════════════════
       FOOTER (rizzi-web)
    ══════════════════════════════════════════════════════════════ */
    footer {
      display: none;
    }

    /* ══════════════════════════════════════════════════════════════
       SCROLLBAR
    ══════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--light); }

    /* ══════════════════════════════════════════════════════════════
       DARK MODE
    ══════════════════════════════════════════════════════════════ */
    [data-theme="dark"] .archive-row:not(.header):hover { background: #fff; }
    [data-theme="dark"] .archive-row:not(.header):hover * { color: #000; }

    /* In dark mode: sfondo nero su griglia e celle */
    [data-theme="dark"] #view-home .thumbs-grid {
      background: #000;
    }
    [data-theme="dark"] #view-home .thumbs-grid .thumb-item {
      background: #000;
    }
    [data-theme="dark"] #view-home .thumbs-grid .thumb-item img {
      display: block;
    }
    /* Gallery thumbnails in dark mode */
    [data-theme="dark"] .gallery-grid {
      background: #000;
    }
    [data-theme="dark"] .gallery-grid-item {
      background: #000;
    }
    /* Foto principale in dark mode: sfondo nero */
    [data-theme="dark"] .gallery-main-img-wrap {
      background: #000;

const cursor = document.getElementById('cursor');
const cursorLabel = document.getElementById('cursor-label');
let mx = 0, my = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  cursorLabel.style.left = mx + 'px';
  cursorLabel.style.top  = my + 'px';
});

function setCursorHover(label = '') {
  cursor.classList.add('hover');
  if (label) {
    cursorLabel.textContent = label;
    cursorLabel.classList.add('show');
  }
}
function resetCursor() {
  cursor.classList.remove('hover', 'drag');
  cursorLabel.classList.remove('show');
}

document.addEventListener('mouseover', e => {
  const t = e.target.closest('button, a, .grid-item, .archive-row, .thumb, .index-list li');
  if (t) {
    const label = t.dataset.label || '';
    setCursorHover(label);

// OVERVIEW GRID — Miechowski
// ══════════════════════════════════════════════════════════════════
function buildOverviewGrid() {
  const grid = document.getElementById('thumbs-grid');
  grid.innerHTML = '';

  // Inserisce spazi vuoti casuali ogni ~5-7 foto — Miechowski style
  const items = [...ALL_IMAGES];
  let insertedBlanks = 0;
  items.forEach((img, i) => {
    // Spazio vuoto casuale: ~1 ogni 5-7 immagini, posizioni irregolari
    if (i > 0 && insertedBlanks < 6 && Math.random() < 0.18) {
      const blank = document.createElement('div');
      blank.className = 'thumb-item thumb-blank';
      grid.appendChild(blank);
      insertedBlanks++;
    }

    const item = document.createElement('div');
    item.className = 'thumb-item';

    const el = document.createElement('img');
    el.src     = img.url;
    el.alt     = img.project.title;
    el.loading = 'lazy';
    item.appendChild(el);

    // Hover: mostra il nome del progetto
    const nameEl = document.getElementById('overview-project-name');
    item.addEventListener('mouseenter', () => {
      if (nameEl) nameEl.textContent = img.project.title || '';
    });
    item.addEventListener('mouseleave', () => {
      if (nameEl) nameEl.innerHTML = '&nbsp;';
    });

    // Click apre l'overlay
    item.addEventListener('click', () => showOverview(img, i));

    grid.appendChild(item);
  });
}

// GALLERY — Nadav Kander style
// ════════════════════════════════════════════════════════════════
let galleryProject = null;
let galleryIndex   = 0;

function openGallery(project) {
  galleryProject = project;
  galleryIndex   = 0;
  renderGallery();
  // Scroll in cima alla gallery
  const vg = document.getElementById('view-gallery');
  vg.scrollTop = 0;
}

function renderGallery() {
  if (!galleryProject) return;
  const p   = galleryProject;
  const img = p.images[galleryIndex];
  const ri  = REAL_IMAGES[p.realImages ? p.realImages[galleryIndex] : galleryIndex];

  // Foto principale — animazione tenda dall'alto identica all'overview
  const mainImg = document.getElementById('gallery-img');

  // 1. Rimuovi la classe revealing e disabilita transition → foto nascosta istantaneamente
  mainImg.classList.remove('revealing');
  mainImg.style.transition = 'none';
  mainImg.style.clipPath = 'inset(0 0 100% 0)';

  // 2. Cambia l'immagine
  mainImg.src = img.url;

  // 3. Dopo un frame, riabilita la transition e apri dall'alto
  setTimeout(() => {
    mainImg.style.transition = '';
    mainImg.style.clipPath = '';
    mainImg.classList.add('revealing');
  }, 30);

  // Didascalia: titolo + anno
  const caption = ri ? `${ri.title}, ${ri.year}` : '';
  document.getElementById('gallery-caption').textContent = caption;

  // Contatore
  document.getElementById('gallery-counter').textContent =
    String(galleryIndex + 1).padStart(2,'0') + ' — ' + String(p.images.length).padStart(2,'0');

  // Titolo serie
  document.getElementById('gallery-series-title').textContent =
    `${p.title} — ${p.year}`;

  // Griglia thumbs
  const thumbsEl = document.getElementById('gallery-thumbs');
  thumbsEl.innerHTML = '';
  p.images.forEach((im, i) => {
    const ri2 = REAL_IMAGES[p.realImages ? p.realImages[i] : i];
    const item = document.createElement('div');
    item.className = 'gallery-grid-item' + (i === galleryIndex ? ' active' : '');
    item.innerHTML = `
      <img src="${im.url}" alt="" loading="lazy" />
      <div class="gallery-grid-caption">${ri2 ? ri2.title + ', ' + ri2.year : ''}</div>
    `;
    item.addEventListener('click', () => {
      galleryIndex = i;
      renderGallery();
      // Scroll alla foto principale con animazione veloce
      document.getElementById('view-gallery').scrollTo({ top: 0, behavior: 'smooth' });
    });
    thumbsEl.appendChild(item);
  });

  // Sezione testo
  document.getElementById('gallery-text-title').textContent = p.title;
  document.getElementById('gallery-text-body').textContent  = p.description || '';
  document.getElementById('gallery-text-meta').textContent  =
    [p.place, p.publication, p.year].filter(Boolean).join(' — ');

  updateFooter();
}

// Click sulla foto principale: avanza/indietro
document.getElementById('gallery-stage').addEventListener('click', e => {
  if (!galleryProject) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const half = rect.left + rect.width / 2;
  if (e.clientX > half) {
    galleryIndex = (galleryIndex + 1) % galleryProject.images.length;
  } else {
    galleryIndex = (galleryIndex - 1 + galleryProject.images.length) % galleryProject.images.length;
  }
  renderGallery();
});

// Click sullo spazio bianco sotto la foto (gallery-main-wrap fuori dall'immagine) → scroll smooth alle thumbs
document.getElementById('gallery-main-wrap').addEventListener('click', e => {
  // Solo se il click NON è sull'immagine
  if (!e.target.closest('#gallery-stage')) {
    const thumbsSection = document.querySelector('.gallery-thumbs-section');
    if (thumbsSection) {
      thumbsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
});

// Navigazione con frecce tastiera nella gallery
document.addEventListener('keydown', e => {
  const vg = document.getElementById('view-gallery');
  if (!galleryProject || !vg.classList.contains('active')) return;
  if (e.key === 'ArrowRight') {
    galleryIndex = (galleryIndex + 1) % galleryProject.images.length;
    renderGallery();
    vg.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (e.key === 'ArrowLeft') {
    galleryIndex = (galleryIndex - 1 + galleryProject.images.length) % galleryProject.images.length;
    renderGallery();
    vg.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

// ══════════════════════════════════════════════════════════════════
const ss = document.getElementById('screensaver');
let ssActive = false;
let ssTimer;
let ssInterval;
let ssCurrentImg = null;

function startScreensaver() {
  ssActive = true;
  ss.classList.add('active');
  ss.innerHTML = '<div class="ss-label">Screensaver — premi un tasto o clicca per uscire</div>';

  let ssIdx = 0;
  function showNext() {
    if (ssCurrentImg) ssCurrentImg.classList.remove('show');
    const img = ALL_IMAGES[ssIdx % ALL_IMAGES.length];
    const el = document.createElement('div');
    el.className = 'ss-img';
    el.style.left = (10 + Math.random() * 60) + 'vw';
    el.style.top  = (10 + Math.random() * 60) + 'vh';
    el.innerHTML = `<img src="${img.url}" alt="" />`;
    ss.appendChild(el);
    setTimeout(() => el.classList.add('show'), 50);
    ssCurrentImg = el;
    ssIdx++;
  }
  showNext();
  ssInterval = setInterval(showNext, 2500);
}

function stopScreensaver() {
  ssActive = false;
  ss.classList.remove('active');
  clearInterval(ssInterval);
}

document.getElementById('btn-screensaver').addEventListener('click', () => {
  if (ssActive) stopScreensaver(); else startScreensaver();
});
ss.addEventListener('click', stopScreensaver);
document.addEventListener('keydown', e => {

// ══════════════════════════════════════════════════════════════════
// INIT — carica dati dal CMS 5151, fallback su dati statici
// Approccio B: categorie come entità separate
// ══════════════════════════════════════════════════════════════════
// URL relativo: funziona sia in locale (localhost:5151) che su qualsiasi host
const CMS_API = window.location.origin + '/api';

// Categorie caricate dal CMS (Approccio B)
let CMS_CATEGORIES = [];

// ─────────────────────────────────────────────────────────────────
// buildDynamicMenu — costruisce il menu overlay dalle categorie CMS
// Ogni categoria diventa una voce espandibile nel menu
// ─────────────────────────────────────────────────────────────────
function buildDynamicMenu(categories, projects) {
  // Con la nuova struttura a griglia, buildMenuSubItems gestisce tutto
  buildMenuSubItems();
  console.log(`Menu griglia: ${categories.length} categorie, ${projects.length} progetti`);
}

async function loadFromCMS() {
  let usedCMS = false;

  try {
    // 1. Carica categorie (Approccio B)
    const catRes = await fetch(CMS_API + '/categories');
    if (!catRes.ok) throw new Error('CMS non disponibile');
    CMS_CATEGORIES = await catRes.json();

    // 2. Carica progetti
    const projRes = await fetch(CMS_API + '/projects');
    if (!projRes.ok) throw new Error('CMS non disponibile');
    const cmsProjects = await projRes.json();

    if (cmsProjects && cmsProjects.length > 0) {
      // Carica tutti i progetti dal CMS
      PROJECTS.length = 0;

      cmsProjects.forEach(p => {
        // Risolve la categoria: usa category_id (Approccio B) oppure fallback su section
        const cat = CMS_CATEGORIES.find(c => c.id === p.category_id);
        const proj = {
          id:          p.id,
          title:       p.title,
          year:        p.year || '',
          place:       p.place || '',
          publication: p.publication || '',
          category:    cat ? cat.name : (p.category || ''),
          category_id: p.category_id || null,
          subtitle:    p.subtitle || '',
          description: p.description || '',
          count:       p.images ? p.images.length : 0,
          images:      p.images ? p.images.map(img => ({
            url:   CMS_API.replace('/api', '') + '/uploads/' + img.file,
            thumb: CMS_API.replace('/api', '') + '/uploads/' + img.thumb,
            ar:    img.ar || 1.33,
            title: img.caption || img.file,
            year:  p.year || ''
          })) : [],
          texts: p.texts || []
        };
        PROJECTS.push(proj);
      });

      // ALL_IMAGES: tutte le immagini dei progetti CMS per la Overview grid
      ALL_IMAGES.length = 0;
      PROJECTS.forEach(p => {
        p.images.forEach(img => {
          ALL_IMAGES.push({ url: img.url, ar: img.ar, project: p });
        });
      });

      usedCMS = true;
      console.log(`CMS: caricati ${CMS_CATEGORIES.length} categorie, ${PROJECTS.length} progetti, ${ALL_IMAGES.length} immagini`);
    } else {
      console.log('CMS: nessun progetto trovato, uso dati statici');
    }
  } catch (e) {
    console.warn('CMS non raggiungibile, uso dati statici:', e.message);
  }

  // Inizializza le viste con i dati (CMS o statici)
  buildOverviewGrid();
  buildArchive();
  buildInterview();

  // Costruisce il menu: dinamico se CMS disponibile, statico altrimenti
  if (usedCMS && CMS_CATEGORIES.length > 0) {
    buildDynamicMenu(CMS_CATEGORIES, PROJECTS);
  } else {
    buildMenuSubItems(); // fallback statico
  }

  // Apri il primo progetto Cities per default
  const firstCities = PROJECTS.find(p => (p.category_id || p.section || '').toLowerCase() === 'cities');
  if (firstCities) openGallery(firstCities);
  else if (PROJECTS.length > 0) openGallery(PROJECTS[0]);
  updateFooter();
}

loadFromCMS();

    landing.classList.add('band-up');
    // Abilita il click sulla foto per andare all'Overview
    landing.style.cursor = 'pointer';
  }

  function goToOverview() {
    // Chiudi la landing e vai all'Overview
    landing.classList.add('gone');
    switchView('home');
  }

  // Auto-alza la banda dopo 3 secondi
  autoTimer = setTimeout(raiseBand, 3000);

  // Click ovunque sulla landing
  landing.addEventListener('click', e => {
    if (e.target.tagName === 'A') return;
    if (bandUp) {
      // Banda già salita: vai all'Overview
      goToOverview();
    } else {
      // Banda ancora visibile: alzala subito
      raiseBand();
    }
  });

  // Click sui link del menu nella banda
  const lbOverview  = document.getElementById('lband-overview');
  const lbCities    = document.getElementById('lband-cities');
  const lbArchive   = document.getElementById('lband-archive');
  const lbInterview = document.getElementById('lband-interview');

  function goToView(view) {
    raiseBand();
    setTimeout(() => {
      landing.classList.add('gone');
      switchView(view);
    }, 950);
  }

  if (lbOverview)  lbOverview.addEventListener('click',  e => { e.preventDefault(); goToView('home'); });
  if (lbCities)    lbCities.addEventListener('click',    e => { e.preventDefault(); goToView('gallery'); });
  if (lbArchive)   lbArchive.addEventListener('click',   e => { e.preventDefault(); goToView('archive'); });
  if (lbInterview) lbInterview.addEventListener('click', e => { e.preventDefault(); goToView('interview'); });

  // Popola la colonna progetti Cities nella banda
  function populateLandingProjects() {
    const col = document.getElementById('lband-col-projects');
    if (!col) return;
    col.innerHTML = '';
    PROJECTS.forEach(p => {
      const catId = (p.category_id || p.section || '').toLowerCase();
      if (catId === 'cities' || catId === 'gallery') {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = p.title + (p.year ? ', ' + p.year : '');
        a.addEventListener('click', e => { e.preventDefault(); goToView('gallery'); });
        col.appendChild(a);
      }
    });
  }

  // Aspetta che il CMS carichi i progetti, poi popola
  const origLoadFromCMS = window._onCMSLoaded;
  window._onCMSLoaded = function() {
    if (origLoadFromCMS) origLoadFromCMS();
    populateLandingProjects();
  };
  // Fallback: prova subito e dopo 1s
  populateLandingProjects();
  setTimeout(populateLandingProjects, 1200);
})();

// ══════════════════════════════════════════════════════════════════
// PULSANTE AGGIORNA — visibile solo su localhost
// ══════════════════════════════════════════════════════════════════
(function() {
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const btnUpdate = document.getElementById('btn-update');
  if (!isLocal || !btnUpdate) return;

  // Mostra il pulsante solo in locale
  btnUpdate.style.display = 'inline-block';

  btnUpdate.addEventListener('click', async () => {
    btnUpdate.classList.add('updating');
    btnUpdate.textContent = '↻ Aggiornamento...';
    try {
      const res = await fetch('/api/update', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        btnUpdate.textContent = '↻ Ricarico...';
        // Ricarica subito la pagina (nessun restart server)
        setTimeout(() => location.reload(), 500);
      } else {
        btnUpdate.textContent = '↻ Errore — riprova';
        btnUpdate.classList.remove('updating');
        setTimeout(() => { btnUpdate.textContent = '↻ Aggiorna'; }, 3000);
      }
    } catch(e) {
      btnUpdate.textContent = '↻ Errore — riprova';
      btnUpdate.classList.remove('updating');
      setTimeout(() => { btnUpdate.textContent = '↻ Aggiorna'; }, 3000);
    }
  });
})();
</script>
</body>
