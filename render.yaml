services:
  - type: web
    name: rizzi-cms
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false   # da impostare manualmente nel dashboard Render
    disk:
      name: rizzi-data
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
